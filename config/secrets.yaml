# Single source of truth for secret patterns.
# Edit this file and run `cargo build` to regenerate the pattern list used by the library.
# DO NOT manually edit the generated file in $OUT_DIR — changes will be overwritten.
#
# Patterns are aligned with gitleaks v8.25+ where possible. Prefix-anchored patterns
# are preferred over context-anchored ones to minimise false positives in pre-commit
# scanning. Context-anchored patterns (keyword + generic payload) live in the disabled
# `code_context` group.
groups:
  ai_apis:
    enabled: true
    patterns:
      - name: anthropic_api_key
        # Covers api03 keys; admin keys handled separately below.
        pattern: '\bsk-ant-(?:api\d{2}-)?[A-Za-z0-9_-]{32,}\b'
        label: ANTHROPIC-KEY
        paranoid_only: false
      - name: anthropic_admin_api_key
        pattern: '\bsk-ant-admin\d{2}-[A-Za-z0-9_-]{80,}\b'
        label: ANTHROPIC-ADMIN-KEY
        paranoid_only: false
      - name: openai_api_key
        # OpenAI has two formats:
        #   - Legacy: sk-<alphanum 20>T3BlbkFJ<alphanum 20>
        #   - Project/service: sk-proj-* / sk-svcacct-* / sk-admin-*
        # The sk- prefix alone is too broad (Anthropic also uses sk-ant-),
        # so we require either a known sub-prefix or the T3BlbkFJ marker.
        pattern: '\bsk-(?:proj-|svcacct-|admin-)[A-Za-z0-9_-]{32,}\b'
        label: OPENAI-KEY
        paranoid_only: false
      - name: openai_api_key_legacy
        # Legacy format with embedded T3BlbkFJ (base64 "OpenAI") marker.
        pattern: '\bsk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}\b'
        label: OPENAI-KEY
        paranoid_only: false
      - name: groq_api_key
        pattern: '\bgsk_[A-Za-z0-9]{40,}\b'
        label: GROQ-KEY
        paranoid_only: false
      - name: huggingface_token
        pattern: '\bhf_[A-Za-z0-9]{34,}\b'
        label: HUGGINGFACE-TOKEN
        paranoid_only: false
      - name: huggingface_org_token
        pattern: '\bapi_org_[A-Za-z0-9]{34,}\b'
        label: HUGGINGFACE-ORG-TOKEN
        paranoid_only: false
      - name: replicate_api_key
        pattern: '\br8_[A-Za-z0-9]{40}\b'
        label: REPLICATE-KEY
        paranoid_only: false
      - name: google_api_key
        pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
        label: GOOGLE-API
        paranoid_only: false
      - name: google_oauth_id
        pattern: '\b[0-9]+-[A-Za-z0-9_]{32}\.apps\.googleusercontent\.com\b'
        label: GOOGLE-OAUTH
        paranoid_only: false
      - name: google_oauth_secret
        pattern: '\bGOCspx-[A-Za-z0-9_-]{28}\b'
        label: GOOGLE-SECRET
        paranoid_only: false
      - name: perplexity_api_key
        pattern: '\bpplx-[A-Za-z0-9]{48}\b'
        label: PERPLEXITY-KEY
        paranoid_only: false
      - name: xai_api_key
        pattern: '\bxai-[A-Za-z0-9]{32,}\b'
        label: XAI-KEY
        paranoid_only: false

  cloud:
    enabled: true
    patterns:
      - name: aws_access_key
        # Gitleaks uses [A-Z2-7]{16} but we keep the broader [A-Z0-9] to
        # catch edge cases. Extra IAM prefixes (AGPA, AIDA, etc.) are valid
        # AWS identifier types.
        # Gitleaks uses [A-Z2-7] (base32) but we keep [A-Z0-9] to catch
        # test fixtures and non-standard key generators.
        pattern: '\b(?:A3T[A-Z0-9]|AKIA|ABIA|ACCA|AGPA|AIDA|AIPA|ANPA|ANVA|APKA|AROA|ASCA|ASIA)[A-Z0-9]{16}\b'
        label: AWS-KEY
        paranoid_only: false
      - name: aws_session_token
        pattern: '\b(?:AQoD|FwoG|IQoJ)[A-Za-z0-9/+=]{100,}\b'
        label: AWS-SESSION
        paranoid_only: false
      - name: aws_bedrock_key
        pattern: '\bABSK[A-Za-z0-9+/]{109,269}={0,2}\b'
        label: AWS-BEDROCK
        paranoid_only: false
      - name: aws_mws_key
        pattern: '\bamzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
        label: AWS-MWS
        paranoid_only: false
      - name: gcp_service_account
        pattern: '\b[a-z0-9-]+@[a-z0-9-]+\.iam\.gserviceaccount\.com\b'
        label: GCP-SERVICE-ACCOUNT
        paranoid_only: false
      - name: azure_storage_key
        pattern: '\b[A-Za-z0-9+/]{86}==\b'
        label: AZURE-STORAGE
        paranoid_only: false
      - name: azure_sas_token
        pattern: '\bsig=[A-Za-z0-9%]+&se=[0-9]+&[A-Za-z0-9&=%]+\b'
        label: AZURE-SAS
        paranoid_only: false
      - name: azure_ad_client_secret
        # Anchored on the Q~ marker per gitleaks; much more specific than the
        # paranoid generic 34-char pattern.
        pattern: '\b[a-zA-Z0-9_~.]{3}\dQ~[a-zA-Z0-9_~.-]{31,34}\b'
        label: AZURE-AD-SECRET
        paranoid_only: false
      - name: digitalocean_pat
        pattern: '\bdop_v1_[a-f0-9]{64}\b'
        label: DO-TOKEN
        paranoid_only: false
      - name: digitalocean_oauth
        pattern: '\bdoo_v1_[a-f0-9]{64}\b'
        label: DO-OAUTH
        paranoid_only: false
      - name: digitalocean_refresh
        pattern: '\bdor_v1_[a-f0-9]{64}\b'
        label: DO-REFRESH
        paranoid_only: false
      - name: cloudflare_origin_ca
        pattern: '\bv1\.0-[a-f0-9]{24}-[a-f0-9]{146}\b'
        label: CLOUDFLARE-CA
        paranoid_only: false
      - name: flyio_token
        pattern: '\b(?:fo1_[A-Za-z0-9_-]{43}|fm1[ar]_[A-Za-z0-9+/]{100,}={0,3}|fm2_[A-Za-z0-9+/]{100,}={0,3})\b'
        label: FLY-TOKEN
        paranoid_only: false
      - name: vault_service_token
        # Covers both new hvs. format and legacy s. format per gitleaks.
        pattern: '\b(?:hvs\.[A-Za-z0-9_-]{90,120}|s\.[a-zA-Z0-9]{24})\b'
        label: VAULT-SERVICE
        paranoid_only: false
      - name: vault_batch_token
        pattern: '\bhvb\.[A-Za-z0-9_-]{138,300}\b'
        label: VAULT-BATCH
        paranoid_only: false
      - name: terraform_cloud_token
        # Fixed: old pattern matched at-{14} which is wrong. Actual format
        # is <id>.atlasv1.<payload> per gitleaks.
        pattern: '\b[a-zA-Z0-9]{14}\.atlasv1\.[a-zA-Z0-9_=-]{60,70}\b'
        label: TERRAFORM-TOKEN
        paranoid_only: false
      - name: alibaba_access_key
        pattern: '\bLTAI[A-Za-z0-9]{20}\b'
        label: ALIBABA-KEY
        paranoid_only: false
      - name: databricks_api_token
        pattern: '\bdapi[a-f0-9]{32}(?:-\d)?\b'
        label: DATABRICKS-TOKEN
        paranoid_only: false
      - name: doppler_api_token
        pattern: '\bdp\.pt\.[A-Za-z0-9]{43}\b'
        label: DOPPLER-TOKEN
        paranoid_only: false
      - name: heroku_api_key_v2
        pattern: '\bHRKU-AA[0-9a-zA-Z_-]{58}\b'
        label: HEROKU-KEY-V2
        paranoid_only: false
      - name: infracost_api_token
        pattern: '\bico-[a-zA-Z0-9]{32}\b'
        label: INFRACOST-TOKEN
        paranoid_only: false
      - name: pulumi_api_token
        pattern: '\bpul-[a-f0-9]{40}\b'
        label: PULUMI-TOKEN
        paranoid_only: false
      - name: scalingo_api_token
        pattern: '\btk-us-[A-Za-z0-9_-]{48}\b'
        label: SCALINGO-TOKEN
        paranoid_only: false
      - name: openshift_user_token
        pattern: '\bsha256~[A-Za-z0-9_-]{43}\b'
        label: OPENSHIFT-TOKEN
        paranoid_only: false

  version_control:
    enabled: true
    patterns:
      - name: github_fine_grained
        pattern: '\bgithub_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}\b'
        label: GITHUB-TOKEN
        paranoid_only: false
      - name: github_pat
        pattern: '\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,}\b'
        label: GITHUB-TOKEN
        paranoid_only: false
      - name: gitlab_pat
        pattern: '\bglpat-[A-Za-z0-9_-]{20,}\b'
        label: GITLAB-TOKEN
        paranoid_only: false
      - name: gitlab_pipeline
        pattern: '\bglptt-[A-Za-z0-9]{40}\b'
        label: GITLAB-PIPELINE
        paranoid_only: false
      - name: gitlab_runner_legacy
        pattern: '\bGR1348941[A-Za-z0-9_-]{20,}\b'
        label: GITLAB-RUNNER
        paranoid_only: false
      - name: gitlab_runner_auth
        pattern: '\bglrt-[0-9a-zA-Z_-]{20,}\b'
        label: GITLAB-RUNNER
        paranoid_only: false
      - name: gitlab_cicd_job_token
        pattern: '\bglcbt-[0-9a-zA-Z]{1,5}_[0-9a-zA-Z_-]{20}\b'
        label: GITLAB-CICD-JOB
        paranoid_only: false
      - name: gitlab_deploy_token
        pattern: '\bgldt-[0-9a-zA-Z_-]{20}\b'
        label: GITLAB-DEPLOY
        paranoid_only: false
      - name: gitlab_feature_flag_token
        pattern: '\bglffct-[0-9a-zA-Z_-]{20}\b'
        label: GITLAB-FF
        paranoid_only: false
      - name: gitlab_feed_token
        pattern: '\bglft-[0-9a-zA-Z_-]{20}\b'
        label: GITLAB-FEED
        paranoid_only: false
      - name: gitlab_incoming_mail_token
        pattern: '\bglimt-[0-9a-zA-Z_-]{25}\b'
        label: GITLAB-MAIL
        paranoid_only: false
      - name: gitlab_k8s_agent_token
        pattern: '\bglagent-[0-9a-zA-Z_-]{50}\b'
        label: GITLAB-K8S-AGENT
        paranoid_only: false
      - name: gitlab_oauth_secret
        pattern: '\bgloas-[0-9a-zA-Z_-]{64}\b'
        label: GITLAB-OAUTH
        paranoid_only: false
      - name: gitlab_scim_token
        pattern: '\bglsoat-[0-9a-zA-Z_-]{20}\b'
        label: GITLAB-SCIM
        paranoid_only: false
      - name: bitbucket_app_password
        # Bitbucket app passwords use ATBB prefix.
        pattern: '\bATBB[A-Za-z0-9]{32,}\b'
        label: BITBUCKET-APP-PW
        paranoid_only: false

  communication:
    enabled: true
    patterns:
      - name: slack_bot_token
        # Widened trailing segment per gitleaks (variable length).
        pattern: '\bxoxb-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*\b'
        label: SLACK-BOT
        paranoid_only: false
      - name: slack_user_token
        # Covers both xoxp and xoxe per gitleaks.
        pattern: '\bxox[pe](?:-[0-9]{10,13}){3}-[a-zA-Z0-9-]{28,34}\b'
        label: SLACK-USER
        paranoid_only: false
      - name: slack_app_token
        # Loosened segment constraints per gitleaks.
        pattern: '\bxapp-\d-[A-Z0-9]+-\d+-[A-Za-z0-9]+\b'
        label: SLACK-APP
        paranoid_only: false
      - name: slack_webhook
        # Added /workflows/ and /triggers/ paths per gitleaks.
        pattern: '(?:https?://)?hooks\.slack\.com/(?:services|workflows|triggers)/[A-Za-z0-9+/]{43,56}'
        label: SLACK-WEBHOOK
        paranoid_only: false
      - name: slack_config_access_token
        pattern: '\bxoxe\.xox[bp]-\d-[A-Z0-9]{163,166}\b'
        label: SLACK-CONFIG
        paranoid_only: false
      - name: slack_config_refresh_token
        pattern: '\bxoxe-\d-[A-Z0-9]{146}\b'
        label: SLACK-CONFIG-REFRESH
        paranoid_only: false
      - name: slack_legacy_bot_token
        pattern: '\bxoxb-[0-9]{8,14}-[a-zA-Z0-9]{18,26}\b'
        label: SLACK-LEGACY-BOT
        paranoid_only: false
      - name: slack_legacy_token
        pattern: '\bxox[os]-\d+-\d+-\d+-[a-fA-F0-9]+\b'
        label: SLACK-LEGACY
        paranoid_only: false
      - name: slack_legacy_workspace_token
        pattern: '\bxox[ar]-(?:\d-)?[0-9a-zA-Z]{8,48}\b'
        label: SLACK-LEGACY-WORKSPACE
        paranoid_only: false
      - name: discord_bot_token
        pattern: '\b(?:MTA|MTE|MTI|OT|Nj|Nz|OD)[A-Za-z0-9]{23,}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}\b'
        label: DISCORD-BOT
        paranoid_only: false
      - name: discord_webhook
        pattern: 'https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_-]+'
        label: DISCORD-WEBHOOK
        paranoid_only: false
      - name: telegram_bot_token
        pattern: '\b[0-9]{8,10}:[A-Za-z0-9_-]{35}\b'
        label: TELEGRAM-BOT
        paranoid_only: true
      - name: microsoft_teams_webhook
        pattern: 'https://[a-z0-9]+\.webhook\.office\.com/webhookb2/[a-z0-9-]+@[a-z0-9-]+/IncomingWebhook/[a-z0-9]+/[a-z0-9-]+'
        label: TEAMS-WEBHOOK
        paranoid_only: false
      - name: sendbird_access_token
        # Prefix-less but context-gated in gitleaks; mark paranoid here.
        pattern: '\b[a-f0-9]{40}\b'
        label: SENDBIRD-TOKEN
        paranoid_only: true
      - name: sendinblue_api_token
        pattern: '\bxkeysib-[a-f0-9]{64}-[A-Za-z0-9]{16}\b'
        label: SENDINBLUE-TOKEN
        paranoid_only: false

  payments:
    enabled: true
    patterns:
      - name: stripe_secret_key
        # Added prod environment per gitleaks.
        pattern: '\b(?:sk|rk)_(?:test|live|prod)_[A-Za-z0-9]{10,99}\b'
        label: STRIPE-SECRET
        paranoid_only: false
      - name: stripe_publishable_key
        pattern: '\bpk_(?:test|live|prod)_[A-Za-z0-9]{10,99}\b'
        label: STRIPE-KEY
        paranoid_only: false
      - name: twilio_api_key
        pattern: '\bSK[0-9a-fA-F]{32}\b'
        label: TWILIO-KEY
        paranoid_only: false
      - name: twilio_account_sid
        pattern: '\bAC[a-f0-9]{32}\b'
        label: TWILIO-SID
        paranoid_only: false
      - name: sendgrid_api_key
        pattern: '\bSG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}\b'
        label: SENDGRID-KEY
        paranoid_only: false
      - name: mailchimp_api_key
        pattern: '\b[a-f0-9]{32}-us\d{1,2}\b'
        label: MAILCHIMP-KEY
        paranoid_only: false
      - name: mailgun_api_key
        # Tightened to hex-only charset per gitleaks.
        pattern: '\bkey-[a-f0-9]{32}\b'
        label: MAILGUN-KEY
        paranoid_only: false
      - name: square_access_token
        # Fixed: EAAA (4 A's) per gitleaks, not EAAAA (5).
        pattern: '\b(?:sq0atp-[A-Za-z0-9_-]{22,60}|EAAA[A-Za-z0-9_-]{22,60})\b'
        label: SQUARE-TOKEN
        paranoid_only: false
      - name: shopify_access_token
        pattern: '\bshpat_[a-fA-F0-9]{32}\b'
        label: SHOPIFY-TOKEN
        paranoid_only: false
      - name: shopify_custom_access_token
        pattern: '\bshpca_[a-fA-F0-9]{32}\b'
        label: SHOPIFY-CUSTOM-TOKEN
        paranoid_only: false
      - name: shopify_private_app_token
        pattern: '\bshppa_[a-fA-F0-9]{32}\b'
        label: SHOPIFY-PRIVATE-TOKEN
        paranoid_only: false
      - name: shopify_shared_secret
        pattern: '\bshpss_[a-fA-F0-9]{32}\b'
        label: SHOPIFY-SHARED-SECRET
        paranoid_only: false
      - name: shippo_api_token
        pattern: '\bshippo_(?:live|test)_[a-fA-F0-9]{40}\b'
        label: SHIPPO-TOKEN
        paranoid_only: false
      - name: flutterwave_secret_key
        pattern: '\bFLWSECK_TEST-[a-h0-9]{32}-X\b'
        label: FLUTTERWAVE-SECRET
        paranoid_only: false
      - name: flutterwave_public_key
        pattern: '\bFLWPUBK_TEST-[a-h0-9]{32}-X\b'
        label: FLUTTERWAVE-PUB
        paranoid_only: false
      - name: flutterwave_encryption_key
        pattern: '\bFLWSECK_TEST-[a-h0-9]{12}\b'
        label: FLUTTERWAVE-ENC
        paranoid_only: false
      - name: plaid_api_token
        pattern: '\baccess-(?:sandbox|development|production)-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
        label: PLAID-TOKEN
        paranoid_only: false

  databases:
    enabled: true
    patterns:
      - name: postgres_uri
        pattern: 'postgres(?:ql)?://[^:\s]+:[^@\s]+@[^/\s]+/\w+'
        label: DB-POSTGRES
        paranoid_only: false
      - name: mysql_uri
        pattern: 'mysql://[^:\s]+:[^@\s]+@[^/\s]+/\w+'
        label: DB-MYSQL
        paranoid_only: false
      - name: mongodb_uri
        pattern: 'mongodb(?:\+srv)?://[^:\s]+:[^@\s]+@[^\s]+'
        label: DB-MONGODB
        paranoid_only: false
      - name: redis_uri
        pattern: 'redis://[^:\s]*:[^@\s]+@[^\s]+'
        label: DB-REDIS
        paranoid_only: false
      - name: planetscale_api_token
        pattern: '\bpscale_tkn_[A-Za-z0-9_=.-]{32,64}\b'
        label: PLANETSCALE-TOKEN
        paranoid_only: false
      - name: planetscale_oauth_token
        pattern: '\bpscale_oauth_[A-Za-z0-9_=.-]{32,64}\b'
        label: PLANETSCALE-OAUTH
        paranoid_only: false
      - name: planetscale_password
        pattern: '\bpscale_pw_[A-Za-z0-9_=.-]{32,64}\b'
        label: PLANETSCALE-PW
        paranoid_only: false
      - name: clickhouse_cloud_secret
        pattern: '\b4b1d[A-Za-z0-9]{38}\b'
        label: CLICKHOUSE-SECRET
        paranoid_only: false

  package_managers:
    enabled: true
    patterns:
      - name: npm_token
        pattern: '\bnpm_[A-Za-z0-9]{36}\b'
        label: NPM-TOKEN
        paranoid_only: false
      - name: pypi_token
        # Tightened to require the specific base64 prefix per gitleaks.
        pattern: '\bpypi-AgEIcHlwaS5vcmc[A-Za-z0-9_-]{50,200}\b'
        label: PYPI-TOKEN
        paranoid_only: false
      - name: nuget_api_key
        pattern: '\boy2[A-Za-z0-9]{43}\b'
        label: NUGET-KEY
        paranoid_only: false
      - name: rubygems_api_token
        pattern: '\brubygems_[a-f0-9]{48}\b'
        label: RUBYGEMS-TOKEN
        paranoid_only: false
      - name: clojars_api_token
        pattern: '\bCLOJARS_[A-Za-z0-9]{60}\b'
        label: CLOJARS-TOKEN
        paranoid_only: false

  monitoring:
    enabled: true
    patterns:
      - name: sentry_dsn
        pattern: 'https://[a-f0-9]{32}@[a-z0-9]+\.ingest\.sentry\.io/[0-9]+'
        label: SENTRY-DSN
        paranoid_only: false
      - name: sentry_org_token
        pattern: '\bsntrys_eyJpYXQiO[a-zA-Z0-9+/]{10,400}={0,2}_[a-zA-Z0-9+/]{43}\b'
        label: SENTRY-ORG-TOKEN
        paranoid_only: false
      - name: sentry_user_token
        pattern: '\bsntryu_[a-f0-9]{64}\b'
        label: SENTRY-USER-TOKEN
        paranoid_only: false
      - name: grafana_cloud_token
        pattern: '\bglc_[A-Za-z0-9+/]{32,400}={0,3}\b'
        label: GRAFANA-CLOUD
        paranoid_only: false
      - name: grafana_service_account_token
        pattern: '\bglsa_[A-Za-z0-9]{32}_[A-Fa-f0-9]{8}\b'
        label: GRAFANA-SA
        paranoid_only: false
      - name: grafana_api_key_legacy
        # Old-format Grafana API key (eyJrIjoi prefix).
        pattern: '\beyJrIjoi[A-Za-z0-9+/]{70,400}={0,3}\b'
        label: GRAFANA-API-KEY
        paranoid_only: false
      - name: newrelic_user_key
        pattern: '\bNRAK-[A-Za-z0-9]{27}\b'
        label: NEWRELIC-USER-KEY
        paranoid_only: false
      - name: newrelic_browser_key
        pattern: '\bNRJS-[a-f0-9]{19}\b'
        label: NEWRELIC-BROWSER-KEY
        paranoid_only: false
      - name: newrelic_insert_key
        pattern: '\bNRII-[A-Za-z0-9-]{32}\b'
        label: NEWRELIC-INSERT-KEY
        paranoid_only: false
      - name: dynatrace_api_token
        pattern: '\bdt0c01\.[A-Za-z0-9]{24}\.[A-Za-z0-9]{64}\b'
        label: DYNATRACE-TOKEN
        paranoid_only: false
      - name: datadog_api_token
        # Prefix-anchored gitleaks variant requires keyword context;
        # kept as paranoid since bare [a-f0-9]{32} is too generic.
        pattern: '\b[a-f0-9]{32}\b'
        label: DATADOG-API
        paranoid_only: true
      - name: sonar_api_token
        pattern: '\b(?:squ|sqp|sqa)_[A-Za-z0-9_=-]{40}\b'
        label: SONAR-TOKEN
        paranoid_only: false

  ci_cd:
    enabled: true
    patterns:
      - name: artifactory_api_key
        pattern: '\bAKCp[A-Za-z0-9]{69}\b'
        label: ARTIFACTORY-KEY
        paranoid_only: false
      - name: artifactory_reference_token
        pattern: '\bcmVmd[A-Za-z0-9]{59}\b'
        label: ARTIFACTORY-REF
        paranoid_only: false
      - name: harness_api_key
        pattern: '\b(?:pat|sat)\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9]{24}\.[a-zA-Z0-9]{20}\b'
        label: HARNESS-KEY
        paranoid_only: false
      - name: postman_api_token
        pattern: '\bPMAK-[a-f0-9]{24}-[a-f0-9]{34}\b'
        label: POSTMAN-TOKEN
        paranoid_only: false
      - name: octopus_deploy_api_key
        pattern: '\bAPI-[A-Z0-9]{26}\b'
        label: OCTOPUS-DEPLOY-KEY
        paranoid_only: false
      - name: prefect_api_token
        pattern: '\bpnu_[a-zA-Z0-9]{36}\b'
        label: PREFECT-TOKEN
        paranoid_only: false
      - name: codecov_access_token
        # Prefix-based; gitleaks uses keyword-anchored generic hex.
        # We accept the codecov-specific CODECOV_ env var prefix.
        pattern: '\bCODECOV_TOKEN=[a-f0-9]{32}\b'
        label: CODECOV-TOKEN
        paranoid_only: false
      - name: snyk_api_token
        pattern: '\bSNYK_TOKEN=[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
        label: SNYK-TOKEN
        paranoid_only: false

  saas:
    enabled: true
    patterns:
      - name: linear_api_key
        pattern: '\blin_api_[A-Za-z0-9]{40}\b'
        label: LINEAR-KEY
        paranoid_only: false
      - name: notion_api_token
        pattern: '\bntn_[0-9]{11}[A-Za-z0-9]{35}\b'
        label: NOTION-TOKEN
        paranoid_only: false
      - name: atlassian_api_token
        # ATATT3 prefix form from gitleaks; keyword-anchored generic form skipped.
        pattern: '\bATATT3[A-Za-z0-9_=-]{186}\b'
        label: ATLASSIAN-TOKEN
        paranoid_only: false
      - name: airtable_pat
        pattern: '\bpat[A-Za-z0-9]{14}\.[a-f0-9]{64}\b'
        label: AIRTABLE-PAT
        paranoid_only: false
      - name: typeform_api_token
        pattern: '\btfp_[A-Za-z0-9_.-]{59}\b'
        label: TYPEFORM-TOKEN
        paranoid_only: false
      - name: readme_api_token
        pattern: '\brdme_[a-z0-9]{70}\b'
        label: README-TOKEN
        paranoid_only: false
      - name: mapbox_api_token
        pattern: '\bpk\.[a-z0-9]{60}\.[a-z0-9]{22}\b'
        label: MAPBOX-TOKEN
        paranoid_only: false
      - name: sourcegraph_access_token
        pattern: '\bsgp_(?:[a-fA-F0-9]{16}|local)_[a-fA-F0-9]{40}\b'
        label: SOURCEGRAPH-TOKEN
        paranoid_only: false
      - name: facebook_page_token
        pattern: '\bEAA[MC][A-Za-z0-9]{100,}\b'
        label: FACEBOOK-PAGE-TOKEN
        paranoid_only: false
      - name: maxmind_license_key
        pattern: '\b[A-Za-z0-9]{6}_[A-Za-z0-9]{29}_mmk\b'
        label: MAXMIND-KEY
        paranoid_only: false
      - name: settlemint_app_token
        pattern: '\bsm_aat_[a-zA-Z0-9]{16}\b'
        label: SETTLEMINT-APP
        paranoid_only: false
      - name: settlemint_pat
        pattern: '\bsm_pat_[a-zA-Z0-9]{16}\b'
        label: SETTLEMINT-PAT
        paranoid_only: false
      - name: settlemint_service_token
        pattern: '\bsm_sat_[a-zA-Z0-9]{16}\b'
        label: SETTLEMINT-SAT
        paranoid_only: false

  infrastructure:
    enabled: true
    patterns:
      - name: age_secret_key
        pattern: '\bAGE-SECRET-KEY-1[QPZRY9X8GF2TVDW0S3JN54KHCE6MUA7L]{58}\b'
        label: AGE-SECRET-KEY
        paranoid_only: false
      - name: adobe_client_secret
        pattern: '\bp8e-[A-Za-z0-9]{32}\b'
        label: ADOBE-SECRET
        paranoid_only: false
      - name: duffel_api_token
        pattern: '\bduffel_(?:test|live)_[A-Za-z0-9_=-]{43}\b'
        label: DUFFEL-TOKEN
        paranoid_only: false
      - name: easypost_api_token
        pattern: '\bEZAK[A-Za-z0-9]{54}\b'
        label: EASYPOST-TOKEN
        paranoid_only: false
      - name: easypost_test_api_token
        pattern: '\bEZTK[A-Za-z0-9]{54}\b'
        label: EASYPOST-TEST-TOKEN
        paranoid_only: false
      - name: frameio_api_token
        pattern: '\bfio-u-[A-Za-z0-9_=-]{64}\b'
        label: FRAMEIO-TOKEN
        paranoid_only: false

  generic:
    enabled: true
    patterns:
      - name: jwt
        # Tightened: require ey prefix on both header and payload segments,
        # min 17 chars each, proper base64url charset per gitleaks.
        pattern: '\bey[A-Za-z0-9]{17,}\.ey[A-Za-z0-9/_-]{17,}\.(?:[A-Za-z0-9/_-]{10,}={0,2})?\b'
        label: JWT
        paranoid_only: false
      - name: private_key_content
        pattern: '(?s)-----BEGIN[^-]+-----[A-Za-z0-9+/=\s]+-----END[^-]+-----'
        label: PRIVATE-KEY
        paranoid_only: false
      - name: private_key
        pattern: "-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP |ENCRYPTED )?PRIVATE KEY(?: BLOCK)?-----"
        label: PRIVATE-KEY
        paranoid_only: false
      - name: ssh_private_key
        pattern: "-----BEGIN (?:RSA|DSA|EC|OPENSSH) PRIVATE KEY-----"
        label: SSH-PRIVATE-KEY
        paranoid_only: false
      - name: ssh_public_key
        pattern: 'ssh-(?:rsa|dss|ed25519|ecdsa)\s+[A-Za-z0-9+/]+={0,2}'
        label: SSH-PUBLIC-KEY
        paranoid_only: false
      - name: github_user_url
        # Matches https:// GitHub URLs only — bare import paths like
        # github.com/user/repo are legitimate Go module paths, not secrets.
        pattern: 'https?://github\.com/([A-Za-z0-9_-]+)(?:/[A-Za-z0-9_.-]+)+'
        label: GITHUB-URL
        paranoid_only: false
      - name: basic_auth
        pattern: '\bBasic\s+[A-Za-z0-9+/]{20,}={0,2}'
        label: BASIC-AUTH
        paranoid_only: false
      - name: bearer_token
        pattern: '\bBearer\s+[A-Za-z0-9_.-]{20,}\b'
        label: BEARER-TOKEN
        paranoid_only: false
      - name: onepassword_ref
        pattern: '\bop://[A-Za-z0-9_-]+(?:/[A-Za-z0-9_.-]+)*\b'
        label: 1PASSWORD-REF
        paranoid_only: false
      - name: onepassword_domain
        pattern: '\b[A-Za-z0-9-]+\.1password\.com\b'
        label: 1PASSWORD-DOMAIN
        paranoid_only: false
      - name: onepassword_secret_key
        # 1Password Emergency Kit secret key format.
        pattern: '\bA3-[A-Z0-9]{6}-(?:[A-Z0-9]{11}|[A-Z0-9]{6}-[A-Z0-9]{5})-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}\b'
        label: 1PASSWORD-SECRET-KEY
        paranoid_only: false
      - name: tailscale_host
        pattern: '\b[A-Za-z0-9-]+\.ts\.net\b'
        label: TAILSCALE-HOST
        paranoid_only: false
      - name: onepassword_service_account
        pattern: '\bops_eyJ[A-Za-z0-9_.-]{50,}'
        label: 1PASSWORD-SA-TOKEN
        paranoid_only: false
      - name: bw_session
        pattern: '\bBW_SESSION=[A-Za-z0-9+/]{40,}={0,2}'
        label: BW-SESSION
        paranoid_only: false
      - name: bws_access_token
        pattern: '\b0\.[A-Za-z0-9]{20,}\.[A-Za-z0-9]{20,}'
        label: BWS-TOKEN
        paranoid_only: false

  pii:
    enabled: true
    min_level: standard
    patterns:
      - name: full_name_in_context
        pattern: "(?i)(?:^|\\b)(?:name|author)\\s*[=:]\\s*[\"']?([A-Z][A-Za-z'-]+ [A-Z][A-Za-z'-]+)[\"']?"
        label: PII-NAME
        paranoid_only: false
      - name: co_authored_by
        pattern: 'Co-Authored-By:\s+[A-Z][A-Za-z''-]+ [A-Z][A-Za-z''-]+'
        label: PII-NAME
        paranoid_only: false
      - name: ssn_us
        pattern: '\b(?:[1-8]\d{2}|0[1-9]\d|00[1-9])-(?:0[1-9]|[1-9]\d)-(?:000[1-9]|00[1-9]\d|0[1-9]\d{2}|[1-9]\d{3})\b'
        label: SSN
        paranoid_only: false
      - name: credit_card
        pattern: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\b'
        label: CREDIT-CARD
        paranoid_only: false
      - name: phone_us
        pattern: '\b(?:\+1[\s.-]?)?\(?\d{3}\)?[\s.-]\d{3}[\s.-]\d{4}\b'
        label: PHONE
        paranoid_only: false
      - name: iban
        pattern: '\b[A-Z]{2}\d{2}[A-Z0-9]{11,30}\b'
        label: IBAN
        paranoid_only: true
      - name: passport
        pattern: '\b[A-Z]{1,2}[0-9]{6,9}\b'
        label: PASSPORT
        paranoid_only: true
      - name: drivers_license_us
        pattern: '\b[A-Z]\d{7}\b'
        label: DRIVERS-LICENSE
        paranoid_only: true

  paranoid:
    enabled: true
    patterns:
      - name: aws_secret_key
        pattern: '\b[A-Za-z0-9+/]{40}\b'
        label: AWS-SECRET
        paranoid_only: true
      - name: azure_client_secret
        pattern: '\b[A-Za-z0-9~._-]{34}\b'
        label: AZURE-SECRET
        paranoid_only: true
      - name: twilio_auth_token
        pattern: '\b[a-f0-9]{32}\b'
        label: TWILIO-AUTH
        paranoid_only: true
      - name: base64_secret
        pattern: '\b[A-Za-z0-9+/]{40,}={0,2}\b'
        label: SECRET
        paranoid_only: true
      - name: cloudflare_api_key
        pattern: '\b[A-Za-z0-9_-]{37}\b'
        label: CLOUDFLARE-KEY
        paranoid_only: true
      - name: heroku_api_key
        pattern: '\b[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}\b'
        label: HEROKU-KEY
        paranoid_only: true
      - name: pagerduty_api_key
        pattern: '\b[A-Za-z0-9+]{20}\b'
        label: PAGERDUTY-KEY
        paranoid_only: true

  # Patterns that produce excessive false positives in source code, documentation,
  # and plan files. Disabled by default. Enable explicitly when scanning
  # non-code content like .env files, config dumps, or log output.
  code_context:
    enabled: false
    patterns:
      - name: password_field
        # Fires on variable names like `api_key =` or `token:` in source code.
        # Only meaningful in non-code contexts (env files, config dumps).
        pattern: "\\b(?:password|passwd|pwd|secret|secret_key|token|api_key|auth_key|private_key|encryption_key)\\b\\s*[=:]\\s*[\"']?[^\\s\"']{8,}[\"']?"
        label: PASSWORD
        paranoid_only: false
      - name: generic_api_key
        # Gitleaks' most important context-anchored rule. Matches keyword +
        # assignment + value. Disabled by default due to high FP in source code.
        pattern: "(?i)[\\w.-]{0,50}?(?:access|auth|api|credential|creds|key|passw(?:or)?d|secret|token)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([\\w.=-]{10,150})"
        label: GENERIC-API-KEY
        paranoid_only: false

# Add your own patterns here.
custom: []
