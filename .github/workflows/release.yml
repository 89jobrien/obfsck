name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: |
          cross build --release --target ${{ matrix.target }} --bin redact
          cross build --release --target ${{ matrix.target }} --bin analyzer
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          ARCHIVE="obfsck-${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/redact dist/
          cp target/${{ matrix.target }}/release/analyzer dist/
          tar -czf "${ARCHIVE}" -C dist redact analyzer
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: obfsck-${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
