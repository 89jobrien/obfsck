[tools]
rust = "stable"

[tasks.demo]
description = "Run the visual demo (builds release binary first)"
run = "cargo build --release && uv run demo/demo.py"


[tasks.check]
description = "Type-check the project"
run = "cargo check"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.codegen]
description = "Regenerate src/secrets.rs from config/secrets.yaml via build.rs"
run = "cargo build -p obfsck 2>&1 | grep -E 'Compiling|Finished|error' || true"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.format]
description = "Format source code"
run = "cargo fmt --all"

[tasks."format-check"]
description = "Check formatting without changing files"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Run clippy with warnings denied"
run = """
cargo clippy --all-targets --features analyzer,legacy-user-scan,path-policy-home-user-redact -- -D warnings
cargo clippy --all-targets --features analyzer,legacy-user-scan,path-policy-non-allowlisted-redact -- -D warnings
"""

[tasks.fix]
description = "Apply automatic clippy fixes"
run = """
cargo clippy --fix --allow-dirty --allow-staged --all-targets --features analyzer,legacy-user-scan,path-policy-home-user-redact
cargo clippy --fix --allow-dirty --allow-staged --all-targets --features analyzer,legacy-user-scan,path-policy-non-allowlisted-redact
"""

[tasks.ci]
description = "Run local CI checks"
depends = ["lint", "test", "build"]

[tasks.logs]
description = "Watch API server logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:analyzer"]
description = "Watch analyzer logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info cargo run --bin analyzer -- --limit 5"

[tasks."logs:debug"]
description = "Watch API server logs with debug level"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=debug,tower_http=debug cargo run --bin api"

[tasks."logs:json"]
description = "Watch API server logs in JSON format (production simulation)"
run = "LOG_FORMAT=json RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:trace"]
description = "Watch API server logs with maximum verbosity"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=trace,tower_http=trace cargo run --bin api"

[tasks."logs:setup"]
description = "Create log directory for file-based logging"
run = "mkdir -p ~/logs/obfsck && echo 'Log directory created at ~/logs/obfsck/'"

[tasks."logs:watch"]
description = "Watch all log files in ~/logs/obfsck/"
run = """
if [ ! -d ~/logs/obfsck ]; then
    echo "Log directory doesn't exist. Run: mise run logs:setup"
    exit 1
fi
if ! ls ~/logs/obfsck/*.log 1> /dev/null 2>&1; then
    echo "No log files found in ~/logs/obfsck/"
    echo "Waiting for log files to be created..."
fi
tail -f ~/logs/obfsck/*.log 2>/dev/null || (echo "Waiting for logs..." && sleep infinity)
"""

[tasks."logs:clean"]
description = "Remove all log files from ~/logs/obfsck/"
run = "rm -f ~/logs/obfsck/*.log && echo 'Log files cleaned'"

[tasks."logs:list"]
description = "List all log files in ~/logs/obfsck/"
run = "ls -lh ~/logs/obfsck/*.log 2>/dev/null || echo 'No log files found'"

[tasks."logs:file"]
description = "Run API server with file logging enabled (logs to ~/logs/obfsck/)"
run = "LOG_DIR=~/logs/obfsck LOG_FORMAT=pretty cargo run --bin api"

[tasks."logs:file-analyzer"]
description = "Run analyzer with file logging enabled (logs to ~/logs/obfsck/)"
run = "LOG_DIR=~/logs/obfsck LOG_FORMAT=pretty cargo run --bin analyzer -- --limit 5"

[tasks."baml:dry-run"]
description = "Run analyzer in dry-run mode to see BAML prompts without LLM calls"
run = "LOG_FORMAT=pretty cargo run --bin analyzer -- --dry-run --limit 3"

[tasks."baml:dry-run-verbose"]
description = "Run analyzer dry-run with verbose logging to see BAML schema details"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=debug cargo run --bin analyzer -- --dry-run --limit 1"

[tasks."baml:test-schema"]
description = "Test BAML schema generation and validation"
run = """
cargo test --lib schema -- --nocapture
cargo test --lib analyzer::tests -- --nocapture
"""

[tasks."baml:inspect"]
description = "Inspect BAML schema IR (intermediate representation)"
run = """
echo "Building BAML schema IR..."
cargo run --example inspect_schema 2>/dev/null || echo "Run 'mise run baml:create-example' to create the inspector"
"""

[tasks."baml:create-example"]
description = "Create example program to inspect BAML schemas"
run = """
mkdir -p examples
cat > examples/inspect_schema.rs << 'EOF'
//! Inspect the BAML schema IR for debugging

use obfsck::schema::analysis_ir;
use simplify_baml::BamlSchema;

fn main() {
    let ir = analysis_ir();

    println!("=== BAML Schema IR ===\n");
    println!("{:#?}", ir);

    println!("\n=== Schema Classes ===\n");
    for class in ir.classes() {
        println!("Class: {}", class.name);
        println!("  Fields:");
        for field in &class.fields {
            println!("    - {}: {:?}", field.name, field.ty);
        }
        println!();
    }
}
EOF
echo "Created examples/inspect_schema.rs"
echo "Run with: cargo run --example inspect_schema"
"""

[tasks."baml:validate"]
description = "Validate BAML schemas by parsing sample LLM responses"
run = """
if [ ! -f tests/sample_llm_responses.json ]; then
    echo "Creating sample LLM responses..."
    mise run baml:create-samples
fi
cargo test --test '*' -- baml --nocapture
"""

[tasks."baml:create-samples"]
description = "Create sample LLM response files for testing"
run = """
mkdir -p tests/fixtures
cat > tests/fixtures/sample_llm_response.json << 'EOF'
{
  "attack_vector": "Unauthorized access attempt via SSH with suspicious credentials",
  "mitre_attack": {
    "tactic": "Initial Access",
    "technique_id": "T1078",
    "technique_name": "Valid Accounts",
    "sub_technique": "Local Accounts"
  },
  "risk": {
    "severity": "High",
    "confidence": "Medium",
    "impact": "Potential system compromise"
  },
  "investigate": [
    "Check SSH login history for this user",
    "Review authentication logs for failed attempts",
    "Verify user account status and permissions"
  ],
  "mitigations": {
    "immediate": [
      "Disable compromised account",
      "Force password reset for affected users"
    ],
    "short_term": [
      "Enable MFA for SSH access",
      "Implement SSH key-based authentication"
    ],
    "long_term": [
      "Deploy automated threat detection",
      "Implement zero-trust architecture"
    ]
  },
  "false_positive": {
    "likelihood": "Low",
    "common_causes": [
      "Legitimate user with typo in credentials",
      "Automated backup system authentication"
    ],
    "distinguishing_factors": [
      "Source IP not in known ranges",
      "Multiple failed attempts before success"
    ]
  },
  "summary": "Detected potential unauthorized SSH access attempt with medium confidence. Investigation recommended."
}
EOF
echo "Created tests/fixtures/sample_llm_response.json"
"""

[tasks."baml:watch"]
description = "Watch for changes and run BAML schema tests"
run = """
echo "Watching for schema changes..."
echo "Press Ctrl+C to stop"
cargo watch -x 'test --lib schema' -x 'test --lib analyzer::tests'
"""
