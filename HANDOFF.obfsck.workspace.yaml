items:
- id: obfsck-7
  name: path-traversal-api
  priority: P0
  status: open
  title: Path traversal in history_detail — URL param used raw in cache_file()
  description: |
    The history_detail handler passes the URL parameter directly into cache_file()
    without sanitization, allowing arbitrary file reads via ../../etc/passwd style paths.
    Validate and canonicalize before any filesystem access.
  files:
  - src/api/
  extra: []
- id: obfsck-8
  name: yaml-parser-silent-drop
  priority: P1
  status: open
  title: build.rs custom YAML parser silently drops all patterns on indentation mismatch
  description: |
    The hand-rolled YAML parser in build.rs silently produces an empty pattern list
    if secrets.yaml has unexpected indentation. Add a parse error and fail the build
    loudly rather than emitting zero patterns.
  files:
  - build.rs
  extra: []
- id: obfsck-9
  name: allowlist-bypass
  priority: P1
  status: open
  title: obfuscate_high_entropy() ignores the runtime allowlist
  description: |
    High-entropy token redaction bypasses the allowlist check, silently overriding
    user exemptions. Thread the allowlist through to the entropy pass.
  files:
  - src/lib.rs
  extra: []
- id: obfsck-10
  name: ci-standardize
  priority: P2
  status: done
  title: Standardize CI — ci.yml, nightly.yml, deny.toml, git hooks
  description: |
    Add canonical three-tier CI (compile-check → test + audit + machete), nightly geiger
    unsafe audit, deny.toml, and git hooks via Justfile. Fixed: missing license field,
    rustls-webpki RUSTSEC-2026-0049 (cargo update), quinn-proto RUSTSEC-2026-0037
    (cargo update), machete false positives for feature-gated deps (simplify_baml_macros,
    walkdir). All CI jobs green.
  files:
  - .github/workflows/ci.yml
  - .github/workflows/nightly.yml
  - Cargo.toml
  - Cargo.lock
  extra: []
  completed: 2026-04-07
