  name: path-traversal-api
  priority: P0
  status: done
  title: Path traversal in history_detail — URL param used raw in cache_file()
  description: |
    The history_detail handler passes the URL parameter directly into cache_file()
    without sanitization, allowing arbitrary file reads via ../../etc/passwd style paths.
    Validate and canonicalize before any filesystem access.
  files:
  - src/api/
  extra: []
  completed: 2026-04-13
- id: obfsck-8
  doob_uuid: 6756ef2a-744b-4d0c-8234-2fbe415e604d
  name: yaml-parser-silent-drop
  priority: P1
  status: done
  title: build.rs custom YAML parser silently drops all patterns on indentation mismatch
  description: |
    The hand-rolled YAML parser in build.rs silently produces an empty pattern list
    if secrets.yaml has unexpected indentation. Add a parse error and fail the build
    loudly rather than emitting zero patterns.
  files:
  - build.rs
  extra: []
  completed: 2026-04-13
