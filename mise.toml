[tools]
rust = "stable"

[tasks.check]
description = "Type-check the project"
run = "cargo check"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.format]
description = "Format source code"
run = "cargo fmt --all"

[tasks."format-check"]
description = "Check formatting without changing files"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Run clippy with warnings denied"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fix]
description = "Apply automatic clippy fixes"
run = "cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features"

[tasks.ci]
description = "Run local CI checks"
depends = ["lint", "test", "build"]

[tasks.logs]
description = "Watch API server logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:analyzer"]
description = "Watch analyzer logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info cargo run --bin analyzer -- --limit 5"

[tasks."logs:debug"]
description = "Watch API server logs with debug level"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=debug,tower_http=debug cargo run --bin api"

[tasks."logs:json"]
description = "Watch API server logs in JSON format (production simulation)"
run = "LOG_FORMAT=json RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:trace"]
description = "Watch API server logs with maximum verbosity"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=trace,tower_http=trace cargo run --bin api"

[tasks."logs:setup"]
description = "Create log directory for file-based logging"
run = "mkdir -p ~/logs/obfsck && echo 'Log directory created at ~/logs/obfsck/'"

[tasks."logs:watch"]
description = "Watch all log files in ~/logs/obfsck/"
run = """
if [ ! -d ~/logs/obfsck ]; then
    echo "Log directory doesn't exist. Run: mise run logs:setup"
    exit 1
fi
if ! ls ~/logs/obfsck/*.log 1> /dev/null 2>&1; then
    echo "No log files found in ~/logs/obfsck/"
    echo "Waiting for log files to be created..."
fi
tail -f ~/logs/obfsck/*.log 2>/dev/null || (echo "Waiting for logs..." && sleep infinity)
"""

[tasks."logs:clean"]
description = "Remove all log files from ~/logs/obfsck/"
run = "rm -f ~/logs/obfsck/*.log && echo 'Log files cleaned'"

[tasks."logs:list"]
description = "List all log files in ~/logs/obfsck/"
run = "ls -lh ~/logs/obfsck/*.log 2>/dev/null || echo 'No log files found'"
