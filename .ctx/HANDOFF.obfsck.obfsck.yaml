  doob_uuid: d7ca5656-2e42-4446-b557-3061f030cffc
  name: allowlist-bypass
  priority: P1
  status: done
  title: obfuscate_high_entropy() ignores the runtime allowlist
  description: |
    High-entropy token redaction bypasses the allowlist check, silently overriding
    user exemptions. Thread the allowlist through to the entropy pass.
  files:
  - src/lib.rs
  extra: []
  completed: 2026-04-13
