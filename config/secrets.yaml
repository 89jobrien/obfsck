groups:
  ai_apis:
    enabled: true
    patterns:
      - name: anthropic_api_key
        pattern: '\bsk-ant-(?:api\d{2}-)?[A-Za-z0-9_-]{32,}\b'
        label: ANTHROPIC-KEY
        paranoid_only: false
      - name: openai_api_key
        pattern: '\bsk-(?:proj-)?[A-Za-z0-9_-]{32,}\b'
        label: OPENAI-KEY
        paranoid_only: false
      - name: groq_api_key
        pattern: '\bgsk_[A-Za-z0-9]{40,}\b'
        label: GROQ-KEY
        paranoid_only: false
      - name: huggingface_token
        pattern: '\bhf_[A-Za-z0-9]{34,}\b'
        label: HUGGINGFACE-TOKEN
        paranoid_only: false
      - name: replicate_api_key
        pattern: '\br8_[A-Za-z0-9]{40}\b'
        label: REPLICATE-KEY
        paranoid_only: false
      - name: google_api_key
        pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
        label: GOOGLE-API
        paranoid_only: false
      - name: google_oauth_id
        pattern: '\b[0-9]+-[A-Za-z0-9_]{32}\.apps\.googleusercontent\.com\b'
        label: GOOGLE-OAUTH
        paranoid_only: false
      - name: google_oauth_secret
        pattern: '\bGOCspx-[A-Za-z0-9_-]{28}\b'
        label: GOOGLE-SECRET
        paranoid_only: false

  cloud:
    enabled: true
    patterns:
      - name: aws_access_key
        pattern: '\b(?:A3T[A-Z0-9]|AKIA|ABIA|ACCA|AGPA|AIDA|AIPA|ANPA|ANVA|APKA|AROA|ASCA|ASIA)[A-Z0-9]{16}\b'
        label: AWS-KEY
        paranoid_only: false
      - name: aws_session_token
        pattern: '\b(?:AQoD|FwoG|IQoJ)[A-Za-z0-9/+=]{100,}\b'
        label: AWS-SESSION
        paranoid_only: false
      - name: aws_mws_key
        pattern: '\bamzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
        label: AWS-MWS
        paranoid_only: false
      - name: gcp_service_account
        pattern: '\b[a-z0-9-]+@[a-z0-9-]+\.iam\.gserviceaccount\.com\b'
        label: GCP-SERVICE-ACCOUNT
        paranoid_only: false
      - name: azure_storage_key
        pattern: '\b[A-Za-z0-9+/]{86}==\b'
        label: AZURE-STORAGE
        paranoid_only: false
      - name: azure_sas_token
        pattern: '\bsig=[A-Za-z0-9%]+&se=[0-9]+&[A-Za-z0-9&=%]+\b'
        label: AZURE-SAS
        paranoid_only: false
      - name: digitalocean_pat
        pattern: '\bdop_v1_[a-f0-9]{64}\b'
        label: DO-TOKEN
        paranoid_only: false
      - name: digitalocean_oauth
        pattern: '\bdoo_v1_[a-f0-9]{64}\b'
        label: DO-OAUTH
        paranoid_only: false
      - name: digitalocean_refresh
        pattern: '\bdor_v1_[a-f0-9]{64}\b'
        label: DO-REFRESH
        paranoid_only: false
      - name: cloudflare_origin_ca
        pattern: '\bv1\.0-[a-f0-9]{24}-[a-f0-9]{146}\b'
        label: CLOUDFLARE-CA
        paranoid_only: false

  version_control:
    enabled: true
    patterns:
      - name: github_fine_grained
        pattern: '\bgithub_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}\b'
        label: GITHUB-TOKEN
        paranoid_only: false
      - name: github_pat
        pattern: '\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,}\b'
        label: GITHUB-TOKEN
        paranoid_only: false
      - name: gitlab_pat
        pattern: '\bglpat-[A-Za-z0-9_-]{20,}\b'
        label: GITLAB-TOKEN
        paranoid_only: false
      - name: gitlab_pipeline
        pattern: '\bglptt-[A-Za-z0-9]{40}\b'
        label: GITLAB-PIPELINE
        paranoid_only: false
      - name: gitlab_runner
        pattern: '\bGR1348941[A-Za-z0-9_-]{20,}\b'
        label: GITLAB-RUNNER
        paranoid_only: false

  communication:
    enabled: true
    patterns:
      - name: slack_bot_token
        pattern: '\bxoxb-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24}\b'
        label: SLACK-BOT
        paranoid_only: false
      - name: slack_user_token
        pattern: '\bxoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-f0-9]{32}\b'
        label: SLACK-USER
        paranoid_only: false
      - name: slack_app_token
        pattern: '\bxapp-[0-9]-[A-Z0-9]{10,}-[0-9]{10,}-[A-Za-z0-9]{64}\b'
        label: SLACK-APP
        paranoid_only: false
      - name: slack_webhook
        pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[A-Za-z0-9]{24}'
        label: SLACK-WEBHOOK
        paranoid_only: false
      - name: discord_bot_token
        pattern: '\b(?:MTA|MTE|MTI|OT|Nj|Nz|OD)[A-Za-z0-9]{23,}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}\b'
        label: DISCORD-BOT
        paranoid_only: false
      - name: discord_webhook
        pattern: 'https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_-]+'
        label: DISCORD-WEBHOOK
        paranoid_only: false
      - name: telegram_bot_token
        pattern: '\b[0-9]{8,10}:[A-Za-z0-9_-]{35}\b'
        label: TELEGRAM-BOT
        paranoid_only: true

  payments:
    enabled: true
    patterns:
      - name: stripe_secret_key
        pattern: '\b(?:sk|rk)_(?:test|live)_[A-Za-z0-9]{24,}\b'
        label: STRIPE-SECRET
        paranoid_only: false
      - name: stripe_publishable_key
        pattern: '\bpk_(?:test|live)_[A-Za-z0-9]{24,}\b'
        label: STRIPE-KEY
        paranoid_only: false
      - name: twilio_api_key
        pattern: '\bSK[a-f0-9]{32}\b'
        label: TWILIO-KEY
        paranoid_only: false
      - name: twilio_account_sid
        pattern: '\bAC[a-f0-9]{32}\b'
        label: TWILIO-SID
        paranoid_only: false
      - name: sendgrid_api_key
        pattern: '\bSG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}\b'
        label: SENDGRID-KEY
        paranoid_only: false
      - name: mailchimp_api_key
        pattern: '\b[a-f0-9]{32}-us[0-9]{1,2}\b'
        label: MAILCHIMP-KEY
        paranoid_only: false
      - name: mailgun_api_key
        pattern: '\bkey-[A-Za-z0-9]{32}\b'
        label: MAILGUN-KEY
        paranoid_only: false

  databases:
    enabled: true
    patterns:
      - name: postgres_uri
        pattern: 'postgres(?:ql)?://[^:\s]+:[^@\s]+@[^/\s]+/\w+'
        label: DB-POSTGRES
        paranoid_only: false
      - name: mysql_uri
        pattern: 'mysql://[^:\s]+:[^@\s]+@[^/\s]+/\w+'
        label: DB-MYSQL
        paranoid_only: false
      - name: mongodb_uri
        pattern: 'mongodb(?:\+srv)?://[^:\s]+:[^@\s]+@[^\s]+'
        label: DB-MONGODB
        paranoid_only: false
      - name: redis_uri
        pattern: 'redis://[^:\s]*:[^@\s]+@[^\s]+'
        label: DB-REDIS
        paranoid_only: false

  package_managers:
    enabled: true
    patterns:
      - name: npm_token
        pattern: '\bnpm_[A-Za-z0-9]{36}\b'
        label: NPM-TOKEN
        paranoid_only: false
      - name: pypi_token
        pattern: '\bpypi-[A-Za-z0-9_-]{50,}\b'
        label: PYPI-TOKEN
        paranoid_only: false
      - name: nuget_api_key
        pattern: '\boy2[A-Za-z0-9]{43}\b'
        label: NUGET-KEY
        paranoid_only: false

  monitoring:
    enabled: true
    patterns:
      - name: sentry_dsn
        pattern: 'https://[a-f0-9]{32}@[a-z0-9]+\.ingest\.sentry\.io/[0-9]+'
        label: SENTRY-DSN
        paranoid_only: false

  generic:
    enabled: true
    patterns:
      - name: jwt
        pattern: '\beyJ[A-Za-z0-9_.+-/=]*\.[A-Za-z0-9_.+-/=]*\.[A-Za-z0-9_.+-/=]*\b'
        label: JWT
        paranoid_only: false
      - name: private_key_content
        pattern: '(?s)-----BEGIN[^-]+-----[A-Za-z0-9+/=\s]+-----END[^-]+-----'
        label: PRIVATE-KEY
        paranoid_only: false
      - name: private_key
        pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP |ENCRYPTED )?PRIVATE KEY(?: BLOCK)?-----'
        label: PRIVATE-KEY
        paranoid_only: false
      - name: ssh_private_key
        pattern: '-----BEGIN (?:RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'
        label: SSH-PRIVATE-KEY
        paranoid_only: false
      - name: ssh_public_key
        pattern: 'ssh-(?:rsa|dss|ed25519|ecdsa)\s+[A-Za-z0-9+/]+={0,2}'
        label: SSH-PUBLIC-KEY
        paranoid_only: false
      - name: github_user_url
        # Matches https:// GitHub URLs only — bare import paths like
        # github.com/user/repo are legitimate Go module paths, not secrets.
        pattern: 'https?://github\.com/([A-Za-z0-9_-]+)(?:/[A-Za-z0-9_.-]+)+'
        label: GITHUB-URL
        paranoid_only: false
      - name: co_authored_by
        pattern: 'Co-Authored-By:\s+[A-Z][A-Za-z''-]+ [A-Z][A-Za-z''-]+'
        label: PII-NAME
        paranoid_only: false
      - name: basic_auth
        pattern: '\bBasic\s+[A-Za-z0-9+/]{20,}={0,2}'
        label: BASIC-AUTH
        paranoid_only: false
      - name: bearer_token
        pattern: '\bBearer\s+[A-Za-z0-9_.-]{20,}\b'
        label: BEARER-TOKEN
        paranoid_only: false
      - name: onepassword_ref
        pattern: '\bop://[A-Za-z0-9_-]+(?:/[A-Za-z0-9_.-]+)*\b'
        label: 1PASSWORD-REF
        paranoid_only: false
      - name: onepassword_domain
        pattern: '\b[A-Za-z0-9-]+\.1password\.com\b'
        label: 1PASSWORD-DOMAIN
        paranoid_only: false
      - name: tailscale_host
        pattern: '\b[A-Za-z0-9-]+\.ts\.net\b'
        label: TAILSCALE-HOST
        paranoid_only: false
      - name: onepassword_service_account
        pattern: '\bops_eyJ[A-Za-z0-9_.-]{50,}'
        label: 1PASSWORD-SA-TOKEN
        paranoid_only: false
      - name: bw_session
        pattern: '\bBW_SESSION=[A-Za-z0-9+/]{40,}={0,2}'
        label: BW-SESSION
        paranoid_only: false
      - name: bws_access_token
        pattern: '\b0\.[A-Za-z0-9]{20,}\.[A-Za-z0-9]{20,}'
        label: BWS-TOKEN
        paranoid_only: false

  pii:
    enabled: true
    min_level: standard
    patterns:
      - name: full_name_in_context
        pattern: "(?i)(?:^|\\b)(?:name|author)\\s*[=:]\\s*[\"']?([A-Z][A-Za-z'-]+ [A-Z][A-Za-z'-]+)[\"']?"
        label: PII-NAME
        paranoid_only: false
      - name: ssn_us
        pattern: '\b(?:[1-8]\d{2}|0[1-9]\d|00[1-9])-(?:0[1-9]|[1-9]\d)-(?:000[1-9]|00[1-9]\d|0[1-9]\d{2}|[1-9]\d{3})\b'
        label: SSN
        paranoid_only: false
      - name: credit_card
        pattern: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\b'
        label: CREDIT-CARD
        paranoid_only: false
      - name: phone_us
        pattern: '\b(?:\+1[\s.-]?)?\(?\d{3}\)?[\s.-]\d{3}[\s.-]\d{4}\b'
        label: PHONE
        paranoid_only: false
      - name: iban
        pattern: '\b[A-Z]{2}\d{2}[A-Z0-9]{11,30}\b'
        label: IBAN
        paranoid_only: true
      - name: passport
        pattern: '\b[A-Z]{1,2}[0-9]{6,9}\b'
        label: PASSPORT
        paranoid_only: true
      - name: drivers_license_us
        pattern: '\b[A-Z]\d{7}\b'
        label: DRIVERS-LICENSE
        paranoid_only: true

  paranoid:
    enabled: true
    patterns:
      - name: aws_secret_key
        pattern: '\b[A-Za-z0-9+/]{40}\b'
        label: AWS-SECRET
        paranoid_only: true
      - name: datadog_api_key
        pattern: '\b[a-f0-9]{32}\b'
        label: DATADOG-API
        paranoid_only: true
      - name: datadog_app_key
        pattern: '\b[a-f0-9]{40}\b'
        label: DATADOG-APP
        paranoid_only: true
      - name: azure_client_secret
        pattern: '\b[A-Za-z0-9~._-]{34}\b'
        label: AZURE-SECRET
        paranoid_only: true
      - name: twilio_auth_token
        pattern: '\b[a-f0-9]{32}\b'
        label: TWILIO-AUTH
        paranoid_only: true
      - name: base64_secret
        pattern: '\b[A-Za-z0-9+/]{40,}={0,2}\b'
        label: SECRET
        paranoid_only: true
      - name: cloudflare_api_key
        pattern: '\b[A-Za-z0-9_-]{37}\b'
        label: CLOUDFLARE-KEY
        paranoid_only: true
      - name: heroku_api_key
        pattern: '\b[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}\b'
        label: HEROKU-KEY
        paranoid_only: true
      - name: pagerduty_api_key
        pattern: '\b[A-Za-z0-9+]{20}\b'
        label: PAGERDUTY-KEY
        paranoid_only: true

# Patterns that produce excessive false positives in source code, documentation,
# and plan files. Disabled by default. Enable explicitly when scanning
# non-code content like .env files, config dumps, or log output.
  code_context:
    enabled: false
    patterns:
      - name: password_field
        # Fires on variable names like `api_key =` or `token:` in source code.
        # Only meaningful in non-code contexts (env files, config dumps).
        pattern: "\\b(?:password|passwd|pwd|secret|secret_key|token|api_key|auth_key|private_key|encryption_key)\\b\\s*[=:]\\s*[\"']?[^\\s\"']{8,}[\"']?"
        label: PASSWORD
        paranoid_only: false

# Add your own patterns here.
custom: []
