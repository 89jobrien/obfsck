[tools]
rust = "stable"

[tasks.check]
description = "Type-check the project"
run = "cargo check"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.format]
description = "Format source code"
run = "cargo fmt --all"

[tasks."format-check"]
description = "Check formatting without changing files"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Run clippy with warnings denied"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fix]
description = "Apply automatic clippy fixes"
run = "cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features"

[tasks.ci]
description = "Run local CI checks"
depends = ["lint", "test", "build"]

[tasks.logs]
description = "Watch API server logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:analyzer"]
description = "Watch analyzer logs (pretty format, info level)"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=info cargo run --bin analyzer -- --limit 5"

[tasks."logs:debug"]
description = "Watch API server logs with debug level"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=debug,tower_http=debug cargo run --bin api"

[tasks."logs:json"]
description = "Watch API server logs in JSON format (production simulation)"
run = "LOG_FORMAT=json RUST_LOG=obfsck=info,tower_http=debug cargo run --bin api"

[tasks."logs:trace"]
description = "Watch API server logs with maximum verbosity"
run = "LOG_FORMAT=pretty RUST_LOG=obfsck=trace,tower_http=trace cargo run --bin api"
