title: "Maestro Session"
description: "API server startup, OAuth login, and K8s session lifecycle logs from the Maestro dev platform"
level: standard
examples:
  - label: "API server startup with credentials"
    type: block
    input: |
      2026-03-24T09:14:02Z INFO  maestro_api: starting server port=8080 environment=production
      2026-03-24T09:14:02Z INFO  maestro_api: vertex project=toptal-maestro region=us-east5 k8s_namespace=team-maestro
