  name: username-regex-fix
  priority: P1
  status: done
  title: Fix username regex \w+ → [A-Za-z0-9._-]+
  description: |
    The current username pattern uses \w+ which matches underscores and Unicode. Narrow to [A-Za-z0-9._-]+ to reduce false positives on non-username tokens.
