title: "PII (Personally Identifiable Information)"
description: "SSN, credit card, phone, full names, commit authorship — enabled at standard and above"
level: standard
examples:
  - label: "US Social Security Number"
    type: kv
    input: "ssn: 123-45-6789"

  - label: "Credit card number (Visa)"
    type: kv
    input: "card_number: 4111111111111111"

  - label: "US phone number"
    type: kv
    input: "phone: (555) 123-4567"

  - label: "Full name in config context"
    type: kv
    input: "author: Alice Johnson"

  - label: "Full name in key=value context"
    type: kv
    input: "name=John Smith"

  - label: "Co-Authored-By git trailer"
    type: kv
    input: "Co-Authored-By: Alice Johnson <alice@example.com>"

  - label: "IBAN (paranoid_only)"
    type: kv
    level: paranoid
    input: "iban: GB29NWBK60161331926819"

  - label: "Passport number (paranoid_only)"
    type: kv
    level: paranoid
    input: "passport: AB1234567"

  - label: "US driver's license (paranoid_only)"
    type: kv
    level: paranoid
    input: "drivers_license: A1234567"
